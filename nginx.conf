server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA-ish fallback so clean URLs / 404s resolve to Quartz's 404 page if present
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long cache for static assets, short for HTML
    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # No write methods, no directory listing
    autoindex off;
    server_tokens off;
}
